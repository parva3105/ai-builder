version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tailorflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tailorflow}
      POSTGRES_DB: ${POSTGRES_DB:-tailorflow}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

  # ── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - api

  # ── LaTeX Sandbox ────────────────────────────────────────────
  latex:
    image: texlive/texlive:latest
    restart: "no"
    volumes:
      - ./uploads:/data
    # This service is invoked on-demand by the API, not kept running.
    # Use `docker compose run --rm latex pdflatex ...` pattern.
    entrypoint: ["echo", "LaTeX sandbox ready – invoke via docker compose run"]

volumes:
  pgdata:
